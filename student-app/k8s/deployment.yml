apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - name: student-app
        image: saqib321/student-app:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: student-app-config
        - secretRef:
            name: student-app-secret
