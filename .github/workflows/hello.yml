name: My First Workflow

on:
  push:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Say Hello
        run: echo 'Hello from GitHub Actions!'

      - name: Show date
        run: date

      - name: Show files
        run: ls -la
