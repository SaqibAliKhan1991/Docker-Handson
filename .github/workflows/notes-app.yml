name: Notes App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'notes-app/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t saqib321/notes-app:latest \
                     -t saqib321/notes-app:${{ github.sha }} \
                     ./notes-app

    - name: Push Docker image
      run: |
        docker push saqib321/notes-app:latest
        docker push saqib321/notes-app:${{ github.sha }}
