name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t saqib321/student-app:latest ./student-app

      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres-db \
            -e POSTGRES_USER=admin \
            -e POSTGRES_PASSWORD=secret \
            -e POSTGRES_DB=mydb \
            postgres:15

      - name: Start test container
        run: |
          docker run -d --name test-app \
            -p 5000:5000 \
            --link postgres-db:postgres-db \
            -e DB_HOST=postgres-db \
            -e DB_USER=admin \
            -e DB_PASSWORD=secret \
            -e DB_NAME=mydb \
            saqib321/student-app:latest

      - name: Wait for app to start
        run: sleep 15

      - name: Test health endpoint
        run: curl http://localhost:5000/health

      - name: Stop test containers
        run: |
          docker stop test-app postgres-db
          docker rm test-app postgres-db

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: docker push saqib321/student-app:latest

      - name: Pipeline complete
        run: echo 'Image tested and pushed successfully!'
