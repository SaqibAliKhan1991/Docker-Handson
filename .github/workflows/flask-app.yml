name: Flask App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'flask-app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t saqib321/flask-app:latest ./wrong-folder

      - name: Run test container
        run: docker run -d --name test-flask -p 5000:5000 saqib321/flask-app:latest

      - name: Wait for app to start
        run: sleep 5

      - name: Test health endpoint
        run: curl http://localhost:5000/health

      - name: Stop test container
        run: docker stop test-flask && docker rm test-flask

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: docker push saqib321/flask-app:latest

      - name: Pipeline complete
        run: echo 'Flask app tested and pushed successfully!'
